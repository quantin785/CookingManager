version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mysql_recettes
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: recettes_db
      MYSQL_USER: recettes_user
      MYSQL_PASSWORD: recettes_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - recettes_network

  adminer:
    image: adminer:latest
    container_name: adminer_recettes
    restart: always
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mysql
    depends_on:
      - mysql
    networks:
      - recettes_network

volumes:
  mysql_data:

networks:
  recettes_network:
    driver: bridge
